baseURL: "https://zichangyang.github.io/"
languageCode: "zh-cn"
title: "Lele's Blog"
theme: "PaperMod"

params:
  env: production
  title: "Lele's Blog"
  description: "记录学习、科研、工程实践和生活想法。"
  defaultTheme: auto
  ShowReadingTime: true
  ShowCodeCopyButtons: true
  ShowPostNavLinks: true

  homeInfoParams:
