<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lele's Blog</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #222;
      background: #f7f7f4;
      line-height: 1.7;
    }
    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 56px 22px;
    }
    header {
      margin-bottom: 48px;
    }
    h1 {
      font-size: 42px;
      margin: 0 0 12px;
    }
    h2 {
      margin-top: 42px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 8px;
    }
    a {
      color: #1f6feb;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .intro {
      font-size: 18px;
      color: #555;
    }
    .post {
      padding: 18px 0;
      border-bottom: 1px solid #e3e3df;
    }
    .post h3 {
      margin: 0 0 6px;
    }
    .date {
      color: #777;
      font-size: 14px;
    }

      margin-top: 56px;

      font-size: 14px;
    }

<body>
  <main>
    <header>

      <p class="intro">记录学习、科研、工程实践和一些生活想法。</p>

    <section>
      <h2>文章</h2>

      <article class="post">
        <h3><a href="#">我的第一篇博客</a></h3>
        <div class="date">2026-06-24</div>
        <p>博客先跑起来，之后再慢慢整理成更完整的技术笔记。</p>

      </article>
    </section>

    <section>
      <h2>关于我</h2>
      <p>你好，我是 Lele。这里会放一些长期保存的笔记和想法。</p>
    </section>

    <footer>
